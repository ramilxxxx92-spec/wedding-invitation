<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Alexei & Elizaveta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg bg-1"></div>
  <div class="bg bg-2"></div>
  <div class="grain"></div>

  <main class="app">
    <section id="slotScreen" class="screen active">
      <div class="hero-card">
        <div class="hero-head">
          <span class="tiny-label">WEDDING INVITATION</span>
          <h1 class="names">Alexei & Elizaveta</h1>
          <p class="subtitle">Try your luck and open our day</p>
        </div>

        <div id="machine" class="machine">
          <div class="machine-cap">
            <div class="lamp-row">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>

          <div class="machine-body">
            <div class="machine-top-panel">
              <div class="hearts-row">
                <span>♡</span>
                <span>♡</span>
                <span>♡</span>
                <span>♡</span>
                <span>♡</span>
              </div>
            </div>

            <div class="slot-window">
              <div class="reel-frame">
                <div class="reel" id="reel1">
                  <div class="symbol">💍</div>
                </div>
              </div>
              <div class="reel-frame">
                <div class="reel" id="reel2">
                  <div class="symbol">💍</div>
                </div>
              </div>
              <div class="reel-frame">
                <div class="reel" id="reel3">
                  <div class="symbol">💍</div>
                </div>
              </div>

              <div class="payline"></div>
            </div>

            <div class="machine-controls">
              <div class="mini-panel"></div>
              <button id="spinBtn" class="main-btn">Крутить</button>
              <div class="mini-panel"></div>
            </div>
          </div>

          <button id="leverBtn" class="lever-btn" aria-label="Потянуть ручку">
            <span class="lever-stick"></span>
            <span class="lever-ball"></span>
          </button>
        </div>

        <div id="resultBlock" class="result-block hidden">
          <p class="win-text">Wedding jackpot</p>
          <h2 class="final-date">00.00.2026</h2>
          <button id="scheduleBtn" class="secondary-btn">Смотреть расписание</button>
        </div>
      </div>
    </section>

    <section id="scheduleScreen" class="screen">
      <div class="info-card">
        <span class="tiny-label">SCHEDULE</span>
        <h2 class="info-title">Расписание дня</h2>

        <div class="timeline">
          <div class="timeline-item">
            <div class="timeline-time">17:00</div>
            <div class="timeline-text">Сбор гостей</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-time">17:30</div>
            <div class="timeline-text">Церемония</div>
          </div>
          <div class="timeline-item">
            <div class="timeline-time">18:30</div>
            <div class="timeline-text">Праздничный ужин</div>
          </div>
        </div>

        <button id="backBtn" class="secondary-btn">Назад</button>
      </div>
    </section>
  </main>

  <canvas id="confettiCanvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
